name: Flutter CI

'on':
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'  # 你的本地版本
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Custom lint
        run: bash tools/run_custom_lint_isolated.sh

      - name: Architecture boundary check
        run: bash tools/check_architecture.sh

      - name: Verify production IAP dart defines
        run: flutter test test/features/upgrade_page_iap_define_test.dart --dart-define-from-file=dart_defines/production.json

      - name: Flutter tests
        # Two passes so the `arch-script` test (which writes/deletes temporary
        # __arch_probe_* files under lib/ to exercise check_architecture.sh)
        # never runs concurrently with the invariant tests that scan lib/ —
        # otherwise they race and flake with PathNotFoundException.
        run: |
          flutter test --exclude-tags arch-script
          flutter test --tags arch-script --concurrency=1

  backend-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cloud sync backend unittest
        working-directory: server/cloud_sync_backend
        run: python -m unittest discover -s tests

      - name: Cloud backup backend unittest
        working-directory: server/cloud_backup_backend
        run: python -m unittest discover -s tests

      - name: IAP verification backend unittest
        working-directory: server/iap_verification_backend
        run: python -m unittest discover -s tests
