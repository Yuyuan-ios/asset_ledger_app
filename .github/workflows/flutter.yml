name: Flutter CI

'on':
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'  # 你的本地版本
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Custom lint
        run: bash tools/run_custom_lint_isolated.sh

      - name: Verify production IAP dart defines
        run: flutter test test/features/upgrade_page_iap_define_test.dart --dart-define-from-file=dart_defines/production.json
